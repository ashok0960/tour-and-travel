version: '3.9'

services:
  backend:
    build: .
    container_name: travel_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=http://localhost
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    networks:
      - travel_network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_MEDIA_URL: http://localhost:8000
    container_name: travel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - travel_network
    restart: unless-stopped

networks:
  travel_network:
    driver: bridge
